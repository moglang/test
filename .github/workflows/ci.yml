name: Package CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: "test"
      RUNTIME_REPOSITORY: Aaron193/moglang
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.RUNTIME_REPOSITORY }}
          path: mog
      - name: Build Mog runtime
        run: cmake -S mog -B mog/build -DCMAKE_BUILD_TYPE=Release && cmake --build mog/build --parallel
      - name: Validate package and run tests
        shell: bash
        run: |
          set -euo pipefail
          stage="$RUNNER_TEMP/github.com/moglang/$PACKAGE_NAME"
          mkdir -p "$(dirname "$stage")"
          rsync -a --exclude .git "$GITHUB_WORKSPACE/" "$stage/"
          "$GITHUB_WORKSPACE/mog/build/interpreter" validate-package "$stage"
          project="$RUNNER_TEMP/package-test"
          mkdir -p "$project"
          cat > "$project/mog.toml" <<EOF
          kind = "project"
          name = "ci-$PACKAGE_NAME"
          version = "0.0.0"
          description = "Package CI test."

          [dependencies]
          "github.com/moglang/$PACKAGE_NAME" = { path = "$stage", version = "0.1.1" }
          EOF
          (
            cd "$project"
            MOG_CACHE_DIR="$RUNNER_TEMP/mog-cache" "$GITHUB_WORKSPACE/mog/build/interpreter" run "$stage/tests/main.mog"
          )

